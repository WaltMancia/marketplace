spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5435/order_db
    username: order_admin
    password: order_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Configuración de RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin

server:
  port: 8083

jwt:
  secret: unaClaveSecretaMuyLargaParaJWTDebeSerDe256BitsComoMinimo1234567890
  expiration: 3600000
  refresh-expiration: 604800000

services:
  user-service-url: http://localhost:8081
  product-service-url: http://localhost:8082

# Nombres de exchanges y queues de RabbitMQ
rabbitmq:
  exchange: marketplace.exchange
  queues:
    order-created: order.created
    stock-reserved: stock.reserved
    stock-failed: stock.reservation.failed
    order-paid: order.paid
  routing-keys:
    order-created: order.created
    stock-reserved: stock.reserved
    stock-failed: stock.reservation.failed
    order-paid: order.paid