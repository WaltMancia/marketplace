<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
        .container { max-width: 600px; margin: 30px auto; background: white;
            border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background: #10b981; padding: 30px; text-align: center; }
        .header h1 { color: white; margin: 0; }
        .body { padding: 30px; }
        .success-icon { font-size: 48px; text-align: center; margin: 20px 0; }
        .order-id { font-size: 28px; font-weight: bold; color: #1a1a2e; text-align: center; }
        .status-badge { display: inline-block; background: #d1fae5; color: #065f46;
            padding: 6px 16px; border-radius: 20px; font-weight: bold; }
        .footer { background: #f8f9fa; padding: 20px; text-align: center;
            color: #666; font-size: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>✅ Orden Confirmada</h1>
    </div>
    <div class="body">
        <div class="success-icon">🎉</div>
        <h2 style="text-align:center;">¡Tu orden fue confirmada!</h2>
        <p style="text-align:center; color:#666;">
            El stock ha sido reservado exitosamente.
        </p>

        <div style="text-align:center; margin: 20px 0;">
            <div style="color:#666; margin-bottom:8px;">Orden:</div>
            <div class="order-id" th:text="'#' + ${orderId}">#123</div>
            <br>
            <span class="status-badge">✅ Stock confirmado</span>
        </div>

        <p style="color:#666;">
            Ahora puedes proceder con el pago. Te enviaremos otra notificación
            cuando el pago sea procesado.
        </p>
    </div>
    <div class="footer">
        © 2024 Marketplace
    </div>
</div>
</body>
</html>
